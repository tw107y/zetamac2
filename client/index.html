<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zetamac Multiplayer</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #1a1a2e;
        color: #eee;
        min-height: 100vh;
      }
      button {
        cursor: pointer;
        font-family: inherit;
        font-size: 1rem;
        padding: 10px 24px;
        border: none;
        border-radius: 6px;
        background: #e94560;
        color: #fff;
        font-weight: 600;
      }
      button:hover { background: #d63852; }
      button:disabled { opacity: 0.4; cursor: default; }
      input {
        font-family: inherit;
        font-size: 1.5rem;
        padding: 8px 16px;
        border: 2px solid #333;
        border-radius: 6px;
        background: #16213e;
        color: #fff;
        outline: none;
        width: 200px;
        text-align: center;
      }
      input:focus { border-color: #e94560; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
